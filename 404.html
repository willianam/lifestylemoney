<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050505">
<title>Lifestyle Money — Página não encontrada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --black-pure: #050505;
    --green-bright: #4ebd73;
    --green-glow: #6feca3;
    --white-soft: #f0f5f1;
    --gray-green: #7a9a85;
    --glass-bg: rgba(13, 26, 18, 0.55);
    --glass-border: rgba(78, 189, 115, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black-pure);
    color: var(--white-soft);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .bg-video {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .bg-video video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .bg-video::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(5, 5, 5, 0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 24px;
    max-width: 520px;
    animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .error-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--green-bright);
    border: 1px solid var(--glass-border);
    padding: 8px 24px;
    border-radius: 100px;
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
  }

  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 700;
    line-height: 1.2;
  }

  h1 em {
    font-style: italic;
    color: var(--green-bright);
  }

  p {
    font-size: 16px;
    color: var(--gray-green);
    max-width: 380px;
    line-height: 1.7;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 15px;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    padding: 16px 48px;
    background: var(--green-bright);
    color: var(--black-pure);
    text-decoration: none;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .btn:hover {
    background: var(--green-glow);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(78, 189, 115, 0.25);
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .bg-video::after { backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
    h1 { font-size: clamp(24px, 7vw, 36px); }
  }
</style>
</head>
<body>

<div class="bg-video">
  <video autoplay muted loop playsinline>
    <source src="/0328_loop.webm" type="video/webm">
    <source src="/0328_loop.mp4" type="video/mp4">
  </video>
</div>

<div class="container">
  <div class="error-code">404</div>
  <h1>Essa página não <em>existe.</em></h1>
  <p>Mas o que você tá procurando talvez esteja a um clique de distância.</p>
  <a href="/" class="btn">Voltar pro início</a>
</div>

</body>
</html>
